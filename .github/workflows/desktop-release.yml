name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    name: Build macOS desktop release
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ./backend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Prepare App Store Connect key
        if: ${{ secrets.APPLE_API_KEY_P8 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          cat <<'EOF' > "$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
          ${{ secrets.APPLE_API_KEY_P8 }}
          EOF
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8" >> "$GITHUB_ENV"
      - name: Build desktop bundle
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: make desktop-build
      - name: Verify desktop bundle
        run: ./.venv/bin/python scripts/verify_desktop_bundle.py
      - name: Archive app bundle
        run: |
          ditto -c -k --keepParent \
            frontend/src-tauri/target/release/bundle/macos/Launchboard.app \
            frontend/src-tauri/target/release/bundle/macos/Launchboard.app.zip
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launchboard-macos-desktop
          path: |
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/macos/Launchboard.app.zip
      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/macos/Launchboard.app.zip
