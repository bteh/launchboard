# Profile Template — Copy this file and rename to create a new profile
# Example: cp _template.yaml my_profile.yaml
#
# Then select the profile in the Settings page, or run:
#   python -m job_finder.main --profile my_profile
#
# This template works for ANY profession — engineers, marketers, designers,
# salespeople, nurses, teachers, analysts, etc. Just fill in your skills
# and target roles.

profile:
  name: "Your Name"                    # Display name in the UI
  description: "Brief description"     # e.g., "Senior marketer targeting growth roles"
  resume_path: ""                      # Path to resume PDF (empty = auto-detect)

# --- SEARCH CONFIGURATION ---

# Job titles to search for (one per line)
# Examples for different professions:
#   Engineer:   "senior software engineer", "staff data engineer", "engineering manager"
#   Marketing:  "marketing manager", "growth lead", "director of marketing"
#   Design:     "senior product designer", "UX researcher", "design director"
#   Sales:      "account executive", "sales manager", "director of sales"
#   Operations: "operations manager", "program manager", "chief of staff"
#   Healthcare: "nurse practitioner", "clinical director", "nurse manager"
target_roles:
  - ""
  # Add your target roles here...

# Keyword-based searches (skills, specialties, industry terms)
# These are searched as freetext on job boards
keyword_searches:
  - ""
  # Add keywords specific to your field...

# Where to search
locations:
  - "Remote"
  # Add cities: "New York, NY", "San Francisco, CA", etc.

# --- SCORING KEYWORDS ---
# These keyword lists determine how jobs are scored against your resume.
# Add YOUR skills and terms from YOUR industry — the scorer uses these
# to match against job descriptions.

keywords:
  # Your core skills (matched against job descriptions)
  # Engineers: python, sql, kubernetes, terraform, etc.
  # Marketers: SEO, analytics, campaign management, HubSpot, etc.
  # Designers: Figma, user research, prototyping, design systems, etc.
  # Nurses: patient care, EMR, clinical protocols, triage, etc.
  technical:
    - ""
    # Add your skills...

  # Leadership / growth signals to look for in job postings
  leadership:
    - "mentorship"
    - "lead"
    - "manager"
    - "build the team"
    # Add leadership keywords relevant to your field...

  # Signals that the role involves building something new
  platform_building:
    - "greenfield"
    - "from scratch"
    - "new initiative"
    # Add building signals...

  # Company/level signals that correlate with higher compensation
  # Leave empty if compensation level isn't a priority
  high_comp_signals: []

# --- SCORING WEIGHTS ---
# How much each dimension matters in the overall score (must sum to 1.0)
#
# Suggested presets:
#   Entry-level:       tech=0.30, lead=0.05, comp=0.10, build=0.05, traj=0.15, culture=0.25, prog=0.10
#   Experienced IC:    tech=0.30, lead=0.10, comp=0.15, build=0.10, traj=0.10, culture=0.15, prog=0.10
#   Leadership-bound:  tech=0.20, lead=0.20, comp=0.12, build=0.13, traj=0.10, culture=0.10, prog=0.15
#   Non-tech pro:      tech=0.25, lead=0.10, comp=0.15, build=0.10, traj=0.10, culture=0.20, prog=0.10
scoring:
  technical_skills: 0.25      # How well your skills match the JD
  leadership_signal: 0.10     # Leadership/growth opportunity signals
  comp_potential: 0.10        # Compensation potential
  platform_building: 0.10     # Building something new vs maintaining
  company_trajectory: 0.10    # Company growth signals
  culture_fit: 0.25           # Culture and work style fit
  career_progression: 0.10    # Career upgrade from current role (set to 0 to disable)

  # Score thresholds for recommendations
  thresholds:
    strong_apply: 70    # Score >= this = "STRONG_APPLY"
    apply: 55           # Score >= this = "APPLY"
    maybe: 40           # Score >= this = "MAYBE", below = "SKIP"

# --- CAREER BASELINE ---
# Your current position — used for career progression scoring
career_baseline:
  current_title: ""                    # e.g., "Marketing Manager", "Senior Nurse", "Sales Director"
  current_level: "mid"                 # intern, junior, associate, mid, senior, staff, principal, manager, director, vp
  current_tc: 80000                    # Current total compensation
  min_acceptable_tc: 70000

# --- COMPENSATION ---
compensation:
  min_base: 60000
  target_total_comp: 100000
  include_equity: false                # Set true if targeting tech/startup roles with equity

# --- SEARCH SETTINGS ---
search_settings:
  results_per_board: 25               # Results per job board per query
  max_days_old: 14                    # Only show listings from the last N days
  exclude_staffing_agencies: true
  country: "USA"
  max_parallel_searches: 6            # Concurrent search threads (6 × 5 boards = 30 requests)
  max_unique_jobs: 300                # Stop searching after finding this many unique jobs
  max_search_tasks: 20                # Hard cap on total JobSpy queries (term × location combos)

# --- JOB BOARDS ---
job_boards:
  - "indeed"
  - "linkedin"
  - "glassdoor"
  - "zip_recruiter"
  - "google"

# Additional sources beyond JobSpy (Indeed/LinkedIn/Glassdoor/ZipRecruiter/Google)
# Set enabled: false to skip any source
# Note: Some sources focus on specific industries:
#   - remotive, himalayas, weworkremotely, remoteok: Remote jobs (all industries)
#   - workatastartup, hackernews: Tech startups
#   - greenhouse, lever: Company career pages (all industries)
#   - cryptojobslist: Crypto/Web3
additional_sources:
  - name: "workatastartup"
    enabled: true
  - name: "remotive"
    enabled: true
  - name: "himalayas"
    enabled: true
  - name: "weworkremotely"
    enabled: true
  - name: "hackernews"
    enabled: true
  - name: "greenhouse"
    enabled: true
  - name: "lever"
    enabled: true
  - name: "remoteok"
    enabled: true
  - name: "cryptojobslist"
    enabled: false           # Enable if targeting crypto/Web3

# --- AUTO-APPLY ---
applicant_info:
  first_name: ""
  last_name: ""
  email: ""
  phone: ""
  linkedin_url: ""

auto_apply:
  enabled: false
  dry_run: true
  methods:
    greenhouse: true
    lever: true
    linkedin_easy_apply: false
  max_applications_per_run: 5
