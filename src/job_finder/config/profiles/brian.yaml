# Profile: Brian — Senior Data Engineer targeting leadership roles
profile:
  name: "Brian"
  description: "Senior DE targeting director/VP leadership roles"
  resume_path: ""  # leave empty to auto-detect from knowledge/ dir

# What to search for
target_roles:
  # Data Engineering
  - "data platform engineer"
  - "analytics engineer"
  - "senior data engineer"
  - "staff data engineer"
  - "principal data engineer"
  - "founding data engineer"
  - "head of data"
  - "director of data engineering"
  - "director of data"
  - "manager data engineering"
  # Management / Leadership
  - "engineering manager"
  - "senior engineering manager"
  - "director of engineering"
  - "VP engineering"
  - "VP of data"
  - "CTO"

keyword_searches:
  - "dbt"
  - "Trino"
  - "lakehouse"
  - "data platform"
  - "iceberg data engineer"
  - "founding engineer data"
  - "build data team"
  - "head of data"
  - "data leader"

locations:
  - "Los Angeles, CA"
  - "Remote"

# Post-search location filtering (removes irrelevant cities from results)
location_preferences:
  filter_enabled: true
  preferred_states: ["CA"]
  preferred_cities: ["Los Angeles"]

# Keyword lists for scoring (used by scorer.py)
