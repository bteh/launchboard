    - "pyspark"

  leadership:
    - "manager"
    - "head of"
    - "director"
    - "lead"
    - "principal"
    - "staff"
    - "founding"
    - "architect"
    - "vp of"
    - "build the team"
    - "hire and mentor"
    - "own the roadmap"
    - "team lead"
    - "people management"
    - "cto"
    - "vp engineering"
    - "director of engineering"
    - "engineering manager"

  platform_building:
    - "greenfield"
    - "from scratch"
    - "v1"
    - "0 to 1"
    - "zero to one"
    - "build the foundation"
    - "establish best practices"
    - "new data platform"
