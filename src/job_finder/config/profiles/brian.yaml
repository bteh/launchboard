    - "first data hire"
    - "build out"

  high_comp_signals:
    - "netflix"
    - "nvidia"
    - "airbnb"
    - "stripe"
    - "databricks"
    - "snowflake"
    - "confluent"
    - "meta"
    - "google"
    - "apple"
    - "amazon"
    - "microsoft"
    - "staff"
    - "principal"
    - "senior staff"
    - "l6"
    - "l7"
    - "e6"
    - "e7"
    - "cto"
    - "vp"
    - "director"

# Job boards to scrape
job_boards:
  - "indeed"
  - "linkedin"
  - "glassdoor"
  - "zip_recruiter"
  - "google"

additional_sources:
  - name: "workatastartup"
    url: "https://www.workatastartup.com/jobs"
    enabled: true
  - name: "remotive"
    url: "https://remotive.com/api/remote-jobs"
    enabled: true
  - name: "himalayas"
    url: "https://himalayas.app/jobs/api"
    enabled: true
  - name: "weworkremotely"
    url: "https://weworkremotely.com"
    enabled: true
  - name: "hackernews"
    url: "https://hn.algolia.com/api/v1"
    enabled: true
  - name: "greenhouse"
    url_pattern: "boards.greenhouse.io"
    enabled: true
  - name: "lever"
    url_pattern: "jobs.lever.co"
    enabled: true

# Company targeting
target_companies:
  big_tech:
    - "Netflix"
    - "NVIDIA"
    - "Airbnb"
    - "Stripe"
    - "Databricks"
    - "Snowflake"
    - "Confluent"
    - "dbt Labs"
    - "Fivetran"
    - "Starburst"
  startup_criteria:
    funding_stages:
      - "Series A"
      - "Series B"
      - "Series C"
    min_funding_amount: 10000000
    prefer_founding_roles: true

# Career baseline for progression scoring
career_baseline:
  current_title: "Senior Data Engineer"
  current_level: "senior"
  current_tc: 200000
  min_acceptable_tc: 200000
  preferred_direction: "up_or_lateral_leadership"

# Scoring weights (must sum to 1.0)
scoring:
  technical_skills: 0.25
  leadership_signal: 0.15
  comp_potential: 0.12
  platform_building: 0.13
  company_trajectory: 0.10
  culture_fit: 0.10
  career_progression: 0.15
  thresholds:
    strong_apply: 70
    apply: 55
    maybe: 40

# Compensation targets
compensation:
  min_base: 190000
  target_total_comp: 300000
  include_equity: true

# Search settings
search_settings:
  results_per_board: 25
  max_days_old: 14
  exclude_staffing_agencies: true
  country: "USA"

# Applicant information (for auto-apply)
applicant_info:
  first_name: ""
  last_name: ""
  email: ""
  phone: ""
  linkedin_url: ""

# Auto-apply configuration
auto_apply:
  enabled: false
  dry_run: true
  methods:
    greenhouse: true
    lever: true
    linkedin_easy_apply: false
  max_applications_per_run: 5
