# Job Search Configuration
# Customize these to match your target roles and preferences

target_roles:
  # Data Engineering
  - "data platform engineer"
  - "analytics engineer"
  - "senior data engineer"
  - "staff data engineer"
  - "principal data engineer"
  - "founding data engineer"
  - "head of data"
  - "director of data engineering"
  - "director of data"
  - "manager data engineering"
  # Management / Leadership
  - "engineering manager"
  - "senior engineering manager"
  - "director of engineering"
  - "VP engineering"
  - "VP of data"
  - "CTO"

# Keyword-based searches (technologies/tools)
keyword_searches:
  - "dbt"
  - "Trino"
  - "lakehouse"
  - "data platform"
  - "iceberg data engineer"
  - "founding engineer data"
  - "build data team"
  - "head of data"
  - "data leader"

locations:
  - "Los Angeles, CA"
  - "Remote"

# Job boards to scrape via JobSpy
job_boards:
  - "indeed"
  - "linkedin"
  - "glassdoor"
  - "zip_recruiter"
  - "google"

# Additional sources (custom scrapers)
additional_sources:
  - name: "workatastartup"
    url: "https://www.workatastartup.com/jobs"
    enabled: true
  - name: "remotive"
    enabled: true
  - name: "himalayas"
    enabled: true
  - name: "weworkremotely"
    enabled: true
  - name: "hackernews"
    enabled: true
  - name: "greenhouse"
    url_pattern: "boards.greenhouse.io"
    enabled: true
  - name: "lever"
    url_pattern: "jobs.lever.co"
    enabled: true
  - name: "remoteok"
    enabled: true
  - name: "cryptojobslist"
    enabled: true
  - name: "wellfound"
    enabled: true
  - name: "workday"
    enabled: true
  - name: "arbeitnow"
    enabled: true
  - name: "jobicy"
    enabled: true
  - name: "themuse"
    enabled: true

# Company targeting
target_companies:
  big_tech:
    - "Netflix"
    - "NVIDIA"
    - "Airbnb"
    - "Stripe"
    - "Databricks"
    - "Snowflake"
    - "Confluent"
    - "dbt Labs"
    - "Fivetran"
    - "Starburst"
  startup_criteria:
    funding_stages:
      - "Series A"
      - "Series B"
      - "Series C"
    min_funding_amount: 10000000  # $10M minimum
    prefer_founding_roles: true

# Career baseline — used for career progression scoring
career_baseline:
  current_title: "Senior Data Engineer"
  current_level: "senior"  # junior, mid, senior, staff, principal, manager, director, vp, cto
  current_tc: 200000
  min_acceptable_tc: 200000
  preferred_direction: "up_or_lateral_leadership"  # up, up_or_lateral_leadership, any

# Scoring weights (must sum to 1.0)
scoring:
  technical_skills: 0.25
  leadership_signal: 0.15
  comp_potential: 0.12
  platform_building: 0.13
  company_trajectory: 0.10
  culture_fit: 0.10
  career_progression: 0.15

# Compensation filters
compensation:
  min_base: 190000
  target_total_comp: 300000
  include_equity: true

# Search frequency
search_settings:
  results_per_board: 25
  results_per_additional_source: 100  # Higher limit for additional scrapers (they only run once per search)
  max_days_old: 14
  exclude_staffing_agencies: true
  country: "USA"

# Applicant information (used for auto-apply)
applicant_info:
  first_name: ""
  last_name: ""
  email: ""
  phone: ""
  linkedin_url: ""

# Auto-apply configuration (opt-in)
auto_apply:
  enabled: false  # Set to true to enable
  dry_run: true   # Set to false to actually submit
  methods:
    greenhouse: true
    lever: true
    linkedin_easy_apply: false  # Not automatable without browser automation
  max_applications_per_run: 5
