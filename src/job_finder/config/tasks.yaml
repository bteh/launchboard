# CrewAI Task Definitions
# Tasks are executed in sequence, with later tasks receiving context from earlier ones

search_jobs_task:
  description: >
    Search for job listings matching the candidate's target roles and preferences.

    Execute the following searches using the job_board_search tool:

    TARGET ROLES (search each as a separate query):
    - "data platform engineer"
    - "analytics engineer"
    - "senior data engineer"
    - "staff data engineer"
    - "manager data engineering"
    - "head of data"
    - "director of data engineering"
    - "founding data engineer"

    KEYWORD SEARCHES (for technology-specific roles):
    - "dbt data engineer"
    - "Trino engineer"
    - "lakehouse engineer"

    LOCATIONS: Search both "Los Angeles, CA" and set is_remote=True for each query.

    For each search, request 25 results per board.

    After gathering all results:
    1. Deduplicate by job URL
    2. Remove staffing agency postings
    3. Flag any roles at these target companies: Netflix, NVIDIA, Airbnb, Stripe,
       Databricks, Snowflake, Confluent, dbt Labs, Fivetran, Starburst
    4. Return the full deduplicated list with all job details

  expected_output: >
    A comprehensive JSON list of unique job listings with these fields for each:
    title, company, location, url, source, description (first 2000 chars),
    salary_min, salary_max, date_posted, is_remote, company_size.
    Include a summary count: total found, by board, by location.
  agent: job_searcher

score_jobs_task:
  description: >
    Score every job listing from the search results against the candidate's resume.

    First, use the resume_parser tool to read the candidate's resume from the
    knowledge/ directory.

    Then, for each job listing, produce a score on these dimensions
    using the following weights:

    1. TECHNICAL SKILLS (30%): How well do the candidate's technical skills
       (dbt, Trino, Spark, Airflow, Python, SQL, data modeling, lakehouse architecture)
       match the JD requirements?

    2. LEADERSHIP SIGNAL (20%): Does the JD indicate this is a leadership role?
       Look for: "build the team", "founding engineer", "head of", "manager",
       "lead", "architect", "own the roadmap", "hire and mentor"

    3. COMP POTENTIAL (15%): Based on company type, level, and location, could this
       role realistically pay $300K+ total comp? Big tech senior/staff = likely yes.
       Seed stage startup = likely no unless significant equity.

    4. PLATFORM BUILDING (15%): Is this a role where you BUILD the data platform
       vs. maintain one? Look for: "greenfield", "from scratch", "v1", "0 to 1",
       "build the foundation", "establish best practices"

    5. COMPANY TRAJECTORY (10%): Is this company on an upward trajectory?
       Well-funded startup, growing big tech team, new data initiative?

    6. CULTURE FIT (10%): Remote-friendly? Modern engineering practices?
       Collaborative culture signals?

    OVERALL SCORE = weighted sum of the above.

    RECOMMENDATION for each job:
    - STRONG_APPLY (score >= 80): Drop everything and apply
    - APPLY (score 65-79): Solid fit, apply this week
    - MAYBE (score 50-64): Apply if you have time
    - SKIP (score < 50): Not worth the effort

    Sort results by overall_score descending.

  expected_output: >
    A JSON array of scored jobs, each containing:
    job_title, company, job_url, overall_score, technical_score,
    leadership_score, comp_potential_score, platform_building_score,
    company_trajectory_score, skill_matches (array), key_strengths (array),
    key_gaps (array), recommendation (STRONG_APPLY/APPLY/MAYBE/SKIP),
    and reasoning (2-3 sentences).
    Sorted by overall_score descending.
  agent: jd_scorer
  context:
    - search_jobs_task

optimize_resumes_task:
  description: >
    For every job scored STRONG_APPLY or APPLY, generate tailored resume
    optimization suggestions.

    For each qualifying job:

    1. BULLET TWEAKS: Identify 3-5 resume bullets that should be reworded to
       better match this specific JD. For each:
       - Show the original bullet
       - Show the optimized version (must be truthful, just repositioned)
       - Explain why the change improves the match
       - List the JD keywords this now addresses

    2. KEYWORDS TO ADD: List specific terms from the JD that are missing from
       the resume and should be woven into existing bullets.

    3. SECTIONS TO EMPHASIZE: Which resume sections should be expanded or
       moved up for this application?

    4. TITLE SUGGESTION: What should the resume headline say for this application?
       E.g., "Staff Data Engineer | Platform Architecture & Team Leadership"

    5. SUMMARY REWRITE: Rewrite the professional summary paragraph specifically
       for this role, leading with the most relevant experience.

    6. ATS NOTES: Any ATS-specific tips for this company's likely system.

    IMPORTANT: All tweaks must be truthful and based on actual resume content.
    Reposition and emphasize, never fabricate.

  expected_output: >
    A JSON array of resume optimizations, one per STRONG_APPLY/APPLY job,
    each containing: job_title, company, bullet_tweaks (array of
    original/tweaked/rationale/keywords), keywords_to_add, sections_to_emphasize,
    title_suggestion, summary_rewrite, ats_compatibility_notes.
  agent: resume_optimizer
  context:
    - search_jobs_task
    - score_jobs_task

write_cover_letters_task:
  description: >
    For every job scored STRONG_APPLY, draft a tailored cover letter.

    Each cover letter must:

    1. OPENING HOOK (1-2 sentences): Reference something specific about the company —
       a recent product launch, blog post, funding round, or technical challenge.
       Never open with "I am excited to apply for..."

    2. VALUE PROPOSITION (1 paragraph): Connect the candidate's most relevant
       experience directly to the role's core challenges. Use specific metrics
       and outcomes from the resume.

    3. TECHNICAL DEPTH (1 paragraph): Demonstrate understanding of the company's
       technical landscape and how the candidate's experience with specific tools
       (dbt, Trino, lakehouse, etc.) applies to their stack.

    4. LEADERSHIP NARRATIVE (1 paragraph): For leadership roles, tell the story
       of building and scaling a data team/platform. For IC roles, emphasize
       technical leadership and mentoring.

    5. CLOSING (2-3 sentences): Express genuine interest tied to the company's
       mission, suggest a specific conversation topic for the interview.

    TONE GUIDELINES:
    - Big tech (Netflix, NVIDIA): Confident, metrics-driven, concise
    - Well-funded startups: Visionary, builder-mentality, entrepreneurial
    - Mid-stage companies: Balanced, emphasize scaling experience

    Keep each letter under 400 words. No fluff.

  expected_output: >
    A JSON array of cover letters, one per STRONG_APPLY job, each containing:
    job_title, company, cover_letter_text (full letter), key_hooks (array),
    company_specific_references (array), tone.
  agent: cover_letter_writer
  context:
    - search_jobs_task
    - score_jobs_task
    - optimize_resumes_task

research_companies_task:
  description: >
    For every job scored STRONG_APPLY or APPLY, research the company and build
    an intelligence profile.

    Use the company_intelligence tool and web search to gather:

    1. FUNDING & FINANCIALS: Funding stage, total raised, key investors,
       revenue estimates, runway signals

    2. TEAM & CULTURE: Total headcount, engineering team size, data team size,
       Glassdoor rating, culture themes from reviews

    3. TECH STACK: Known data infrastructure, cloud provider, key technologies,
       open source contributions, engineering blog posts

    4. GROWTH SIGNALS: Number of open data roles, recent product launches,
       customer/revenue growth, market position

    5. COMPENSATION INTEL: Levels.fyi data, Glassdoor salary ranges, Blind posts,
       whether $300K+ TC is realistic at this company/level

    6. RED FLAGS: Recent layoffs, high turnover, negative review themes,
       regulatory issues, runway concerns

    7. WHY JOIN: 2-3 compelling reasons to join this company for this specific role

    8. INTERVIEW TIPS: Known interview process, common questions, preparation advice

  expected_output: >
    A JSON array of company profiles, one per STRONG_APPLY/APPLY company,
    each containing: company_name, industry, funding_stage, total_funding,
    employee_count, data_team_size, tech_stack_signals, recent_news,
    glassdoor_rating, growth_signals, red_flags, comp_intel, why_join,
    interview_tips.
  agent: company_researcher
  context:
    - search_jobs_task
    - score_jobs_task

compile_results_task:
  description: >
    Compile all results into a final prioritized action plan and save everything
    to the application tracking database.

    FINAL OUTPUT should include:

    1. EXECUTIVE SUMMARY: Total jobs found, scored, and recommended.
       How many STRONG_APPLY, APPLY, MAYBE, SKIP.

    2. TOP OPPORTUNITIES TABLE: For STRONG_APPLY and APPLY jobs, sorted by score:
       | Rank | Company | Role | Score | Comp Potential | Key Strength | Action |

    3. DETAILED PROFILES: For each STRONG_APPLY job:
       - Score breakdown with reasoning
       - Company intel highlights
       - Resume tweaks summary
       - Cover letter (ready to send)
       - Specific next steps (apply link, referral to seek, etc.)

    4. WEEKLY ACTION PLAN:
       - This week: Apply to all STRONG_APPLY roles (list them)
       - Next week: Apply to top APPLY roles
       - Ongoing: Monitor MAYBE roles for updates

    5. MARKET INSIGHTS:
       - Salary trends observed across listings
       - Most in-demand skills in these roles
       - Companies hiring most aggressively for data roles

    Save all STRONG_APPLY and APPLY jobs to the application database with
    status="found" and all scoring/intel data populated.

  expected_output: >
    A comprehensive markdown report containing the executive summary,
    top opportunities table, detailed profiles for STRONG_APPLY roles,
    weekly action plan, and market insights. This is the candidate's
    job search command center.
  agent: pipeline_coordinator
  context:
    - search_jobs_task
    - score_jobs_task
    - optimize_resumes_task
    - write_cover_letters_task
    - research_companies_task
