# Workday Career Portal Registry
# ─────────────────────────────────────────────────────────────────────────
# Each employer entry needs:
#   name      — Display name
#   tenant    — Workday tenant slug (from the career site URL)
#   site_id   — Career site identifier
#   base_url  — Root URL (pattern: https://{tenant}.wd{N}.myworkdayjobs.com)
#
# To find these values for a company:
#   1. Go to their careers page
#   2. Open browser DevTools → Network tab
#   3. Search for any job → look for POST to /wday/cxs/{tenant}/{site_id}/jobs
#   4. The base_url is the origin of that request
#
# Add new employers below and they'll be picked up automatically.

